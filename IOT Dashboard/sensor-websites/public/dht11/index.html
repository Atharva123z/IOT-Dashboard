<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHT11 Monitor</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
  }

  .card {
    background: #0f172a;
    padding: 35px 45px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 260px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .value {
    font-size: 36px;
    font-weight: bold;
    margin-top: 10px;
    color: #38bdf8;
  }

  .label {
    opacity: 0.7;
    font-size: 14px;
  }

  .status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="card">
  <h1>DHT11</h1>

  <div class="label">Temperature</div>
  <div id="temp" class="value">-- °C</div>

  <div class="label">Humidity</div>
  <div id="hum" class="value">-- %</div>

  <div id="status" class="status">Connecting to Firebase...</div>
</div>

<script type="module">
  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔑 Firebase config (API key already embedded)
  const firebaseConfig = {
    apiKey: "AIzaSyCpJqny4BFU-lFfVjLiCNwmU8PZpyjm7d4",
    authDomain: "esp-projects-92383.firebaseapp.com",
    databaseURL: "https://esp-projects-92383-default-rtdb.firebaseio.com",
    projectId: "esp-projects-92383"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const tempRef = ref(db, "sensors/dht11/temperature");
  const humRef  = ref(db, "sensors/dht11/humidity");

  let lastTemp = null;
  let lastHum  = null;

  function updateUI() {
    if (lastTemp !== null && lastHum !== null) {
      document.getElementById("temp").innerText =
        lastTemp.toFixed(1) + " °C";
      document.getElementById("hum").innerText =
        lastHum.toFixed(1) + " %";
      document.getElementById("status").innerText = "Live (Firebase)";
    }
  }

  onValue(tempRef, (snapshot) => {
    if (snapshot.exists()) {
      lastTemp = snapshot.val();
      updateUI();
    }
  });

  onValue(humRef, (snapshot) => {
    if (snapshot.exists()) {
      lastHum = snapshot.val();
      updateUI();
    }
  });
</script>

</body>
</html>
