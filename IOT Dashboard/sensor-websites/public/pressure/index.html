<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMP180 Monitor</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
  }

  .card {
    background: #0f172a;
    padding: 35px 45px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 280px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .value {
    font-size: 32px;
    font-weight: bold;
    margin-top: 10px;
    color: #facc15;
  }

  .label {
    opacity: 0.7;
    font-size: 14px;
    margin-top: 10px;
  }

  .status {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="card">
  <h1>BMP180</h1>

  <div class="label">Pressure</div>
  <div id="pressure" class="value">-- hPa</div>

  <div class="label">Temperature</div>
  <div id="temp" class="value">-- °C</div>

  <div id="status" class="status">Connecting to Firebase...</div>
</div>

<script type="module">
  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔑 Firebase config (API key embedded)
  const firebaseConfig = {
    apiKey: "AIzaSyCpJqny4BFU-lFfVjLiCNwmU8PZpyjm7d4",
    authDomain: "esp-projects-92383.firebaseapp.com",
    databaseURL: "https://esp-projects-92383-default-rtdb.firebaseio.com",
    projectId: "esp-projects-92383"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const pressureRef = ref(db, "sensors/pressure/pressure");
  const tempRef     = ref(db, "sensors/pressure/temperature");

  let pressure = null;
  let temperature = null;

  function updateUI() {
    if (pressure !== null && temperature !== null) {
      document.getElementById("pressure").innerText =
        pressure.toFixed(1) + " hPa";
      document.getElementById("temp").innerText =
        temperature.toFixed(1) + " °C";
      document.getElementById("status").innerText = "Live (Firebase)";
    }
  }

  onValue(pressureRef, (snapshot) => {
    if (snapshot.exists()) {
      pressure = snapshot.val();
      updateUI();
    }
  });

  onValue(tempRef, (snapshot) => {
    if (snapshot.exists()) {
      temperature = snapshot.val();
      updateUI();
    }
  });
</script>

</body>
</html>
