<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQ-3 Gas Monitor</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #1f2933;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
  }

  .card {
    background: #111827;
    padding: 35px 45px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  }

  h1 {
    margin-bottom: 10px;
  }

  .value {
    font-size: 46px;
    font-weight: bold;
    margin-top: 15px;
    color: #f87171;
  }

  .status {
    margin-top: 10px;
    font-size: 18px;
  }
</style>
</head>

<body>

<div class="card">
  <h1>MQ-3 Gas Sensor</h1>
  <div id="gas" class="value">----</div>
  <div id="status" class="status">Connecting to Firebase...</div>
</div>

<script type="module">
  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔑 Firebase config (API key already added)
  const firebaseConfig = {
    apiKey: "AIzaSyCpJqny4BFU-lFfVjLiCNwmU8PZpyjm7d4",
    authDomain: "esp-projects-92383.firebaseapp.com",
    databaseURL: "https://esp-projects-92383-default-rtdb.firebaseio.com",
    projectId: "esp-projects-92383"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 🔥 Gas value path
  const gasRef = ref(db, "sensors/gas/value");

  onValue(gasRef, (snapshot) => {
    if (snapshot.exists()) {
      const value = snapshot.val();
      document.getElementById("gas").innerText = value;

      if (value > 2500)
        document.getElementById("status").innerText = "Alcohol / Gas Detected";
      else
        document.getElementById("status").innerText = "Clean Air";
    } else {
      document.getElementById("gas").innerText = "--";
      document.getElementById("status").innerText = "No data";
    }
  });
</script>

</body>
</html>
