<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Monitor</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #7f1d1d);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
  }

  .card {
    background: #0f172a;
    padding: 35px 45px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 280px;
  }

  h1 {
    margin-bottom: 15px;
  }

  .value {
    font-size: 46px;
    font-weight: bold;
    margin-top: 10px;
    color: #fb7185;
  }

  .label {
    opacity: 0.7;
    font-size: 14px;
  }

  .status {
    margin-top: 12px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="card">
  <h1>Pulse Sensor</h1>

  <div class="label">Heart Rate</div>
  <div id="bpm" class="value">-- BPM</div>

  <div id="status" class="status">Connecting to Firebase...</div>
</div>

<script type="module">
  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔑 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCpJqny4BFU-lFfVjLiCNwmU8PZpyjm7d4",
    authDomain: "esp-projects-92383.firebaseapp.com",
    databaseURL: "https://esp-projects-92383-default-rtdb.firebaseio.com",
    projectId: "esp-projects-92383"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const bpmRef = ref(db, "sensors/pulse/bpm");

  onValue(bpmRef, (snapshot) => {
    if (snapshot.exists()) {
      const bpm = snapshot.val();

      if (bpm > 0) {
        document.getElementById("bpm").innerText =
          bpm + " BPM";
        document.getElementById("status").innerText =
          "Heartbeat detected";
      } else {
        document.getElementById("bpm").innerText = "-- BPM";
        document.getElementById("status").innerText =
          "Place finger on sensor";
      }
    } else {
      document.getElementById("bpm").innerText = "-- BPM";
      document.getElementById("status").innerText = "No data";
    }
  });
</script>

</body>
</html>
