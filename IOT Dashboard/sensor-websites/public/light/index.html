<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BH1750 Light Monitor</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
  }

  .card {
    background: #0f172a;
    padding: 35px 45px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    width: 280px;
  }

  h1 {
    margin-bottom: 15px;
  }

  .value {
    font-size: 42px;
    font-weight: bold;
    margin-top: 10px;
    color: #fde047;
  }

  .label {
    opacity: 0.7;
    font-size: 14px;
  }

  .status {
    margin-top: 12px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="card">
  <h1>BH1750</h1>

  <div class="label">Light Intensity</div>
  <div id="lux" class="value">-- lx</div>

  <div id="status" class="status">Connecting to Firebase...</div>
</div>

<script type="module">
  import { initializeApp } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue } from
    "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // 🔑 Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCpJqny4BFU-lFfVjLiCNwmU8PZpyjm7d4",
    authDomain: "esp-projects-92383.firebaseapp.com",
    databaseURL: "https://esp-projects-92383-default-rtdb.firebaseio.com",
    projectId: "esp-projects-92383"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const luxRef = ref(db, "sensors/light/lux");

  onValue(luxRef, (snapshot) => {
    if (snapshot.exists()) {
      const lux = snapshot.val();

      document.getElementById("lux").innerText =
        lux.toFixed(1) + " lx";

      let condition = "Normal";
      if (lux < 50) condition = "Dark";
      else if (lux < 1000) condition = "Dim";
      else if (lux < 10000) condition = "Bright";
      else condition = "Very Bright";

      document.getElementById("status").innerText = condition;
    } else {
      document.getElementById("lux").innerText = "-- lx";
      document.getElementById("status").innerText = "No data";
    }
  });
</script>

</body>
</html>
